
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1.5rem 1rem; max-width: 640px; margin: 0 auto; }
.screen { display: none; }
.screen.active { display: block; }

.logo { text-align: center; margin-bottom: 2rem; }
.logo-icon { font-size: 48px; }
.logo h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-top: 8px; }
.logo p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

.categories { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.cat-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem; cursor: pointer; text-align: left; transition: border-color 0.15s; }
.cat-btn:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
.cat-btn .cat-icon { font-size: 22px; margin-bottom: 6px; }
.cat-btn .cat-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.cat-btn .cat-count { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }

.btn-primary { width: 100%; padding: 12px; background: #185FA5; color: #E6F1FB; border: none; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: #0C447C; }

.progress-bar { background: var(--color-background-secondary); border-radius: 999px; height: 6px; margin-bottom: 1rem; overflow: hidden; }
.progress-fill { height: 100%; background: #185FA5; border-radius: 999px; transition: width 0.3s; }

.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.q-num { font-size: 13px; color: var(--color-text-secondary); }
.q-score { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.q-streak { font-size: 13px; color: #185FA5; }

.q-text { font-size: 17px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; margin-bottom: 1.5rem; min-height: 64px; }

.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
.opt-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 14px 16px; text-align: left; font-size: 15px; color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; }
.opt-btn:hover:not(:disabled) { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
.opt-btn.correct { background: #EAF3DE; border-color: #3B6D11; color: #27500A; }
.opt-btn.wrong { background: #FCEBEB; border-color: #A32D2D; color: #791F1F; }
.opt-btn:disabled { cursor: default; }

.feedback { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1rem; min-height: 20px; line-height: 1.5; }
.feedback.show { color: var(--color-text-primary); }

.btn-next { width: 100%; padding: 12px; background: transparent; color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; cursor: pointer; display: none; }
.btn-next:hover { background: var(--color-background-secondary); }
.btn-next.show { display: block; }

.result-box { text-align: center; padding: 2rem 1rem; }
.result-trophy { font-size: 56px; margin-bottom: 1rem; }
.result-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.result-sub { font-size: 15px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.btn-replay { width: 100%; padding: 12px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; cursor: pointer; margin-top: 10px; color: var(--color-text-primary); }
.btn-replay:hover { background: var(--color-background-secondary); }
</style>

<div id="app">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Trivia de béisbol venezolano — selecciona categoría y responde preguntas</h2>

  <div id="screen-home" class="screen active">
    <div class="logo">
      <div class="logo-icon">⚾</div>
      <h1>Trivia Beisbolera</h1>
      <p>¿Cuánto sabes del béisbol venezolano?</p>
    </div>
    <div class="categories" id="cat-grid"></div>
    <button class="btn-primary" id="btn-start" onclick="startGame()">Jugar ↗</button>
  </div>

  <div id="screen-game" class="screen">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="q-meta">
      <span class="q-num" id="q-num">Pregunta 1 de 10</span>
      <span class="q-score" id="q-score">0 pts</span>
    </div>
    <div class="q-streak" id="q-streak" style="margin-bottom:1rem;min-height:20px;"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Siguiente pregunta →</button>
  </div>

  <div id="screen-result" class="screen">
    <div class="result-box">
      <div class="result-trophy" id="result-trophy">🏆</div>
      <div class="result-title" id="result-title">¡Resultado!</div>
      <div class="result-sub" id="result-sub"></div>
      <div class="result-stats">
        <div class="stat-card"><div class="stat-label">Puntaje</div><div class="stat-val" id="res-score">0</div></div>
        <div class="stat-card"><div class="stat-label">Correctas</div><div class="stat-val" id="res-correct">0/10</div></div>
        <div class="stat-card"><div class="stat-label">Mejor racha</div><div class="stat-val" id="res-streak">0</div></div>
      </div>
      <button class="btn-primary" onclick="shareResult()">Compartir resultado</button>
      <button class="btn-replay" onclick="goHome()">Jugar de nuevo</button>
    </div>
  </div>
</div>

<script>
const allQuestions = {
  lvbp: {
    name: "LVBP",
    icon: "🦁",
    desc: "Liga Venezolana",
    questions: [
      { q: "¿Cuántos equipos conforman actualmente la LVBP?", opts: ["6", "7", "8", "10"], a: 2, fact: "La LVBP tiene 8 equipos: Cardenales, Leones, Tiburones, Magallanes, Caracas, Lara, Aragua y Margarita." },
      { q: "¿Qué equipo es conocido como 'El Equipo del Pueblo'?", opts: ["Leones del Caracas", "Navegantes del Magallanes", "Cardenales de Lara", "Tiburones de La Guaira"], a: 1, fact: "Magallanes es el equipo con mayor número de seguidores en Venezuela, conocido popularmente como el Equipo del Pueblo." },
      { q: "¿En qué ciudad juegan los Leones del Caracas?", opts: ["Maracaibo", "Valencia", "Caracas", "Barquisimeto"], a: 2, fact: "Los Leones del Caracas juegan en el Estadio Universitario de Caracas." },
      { q: "¿Qué equipo juega sus partidos en Maracaibo?", opts: ["Águilas del Zulia", "Tigres de Aragua", "Cardenales de Lara", "Bravos de Margarita"], a: 0, fact: "Las Águilas del Zulia tienen su sede en Maracaibo y juegan en el Estadio Luis Aparicio El Grande." },
      { q: "¿Cuál es el color representativo de los Tiburones de La Guaira?", opts: ["Rojo y azul", "Verde y blanco", "Azul y blanco", "Amarillo y negro"], a: 2, fact: "Los Tiburones de La Guaira visten azul y blanco, representando al estado La Guaira." },
      { q: "¿Qué equipo tiene como mascota un pájaro rojo?", opts: ["Leones del Caracas", "Cardenales de Lara", "Tigres de Aragua", "Navegantes del Magallanes"], a: 1, fact: "Los Cardenales de Lara tienen como símbolo al cardenal, un pájaro rojo muy común en Venezuela." },
      { q: "¿Cuál es el estadio de los Navegantes del Magallanes?", opts: ["Estadio Monumental", "Estadio Universitario", "Estadio José Bernardo Pérez", "Estadio Luis Aparicio"], a: 2, fact: "El Estadio José Bernardo Pérez en Valencia es la casa de los Navegantes del Magallanes." },
      { q: "¿Qué equipo representa al estado Aragua?", opts: ["Leones", "Tiburones", "Tigres", "Cardenales"], a: 2, fact: "Los Tigres de Aragua son el equipo que representa a ese estado, con sede en Maracay." },
    ]
  },
  grandesligas: {
    name: "Grandes Ligas",
    icon: "🌟",
    desc: "MLB Venezolanos",
    questions: [
      { q: "¿Qué venezolano fue el primer en ser nombrado MVP de la Serie Mundial?", opts: ["Omar Vizquel", "Miguel Cabrera", "Johan Santana", "Bobby Abreu"], a: 1, fact: "Miguel Cabrera fue reconocido como uno de los mejores venezolanos en MLB, ganando la Triple Corona en 2012." },
      { q: "¿En qué posición jugó Omar Vizquel durante casi toda su carrera?", opts: ["Segunda base", "Tercera base", "Campo corto", "Centro del jardín"], a: 2, fact: "Omar Vizquel es considerado uno de los mejores campocortos defensivos de la historia del béisbol." },
      { q: "¿De qué estado venezolano es originario Miguel Cabrera?", opts: ["Aragua", "Zulia", "Miranda", "Carabobo"], a: 0, fact: "Miguel Cabrera nació en Maracay, estado Aragua, el 18 de abril de 1983." },
      { q: "¿Qué pitcher venezolano ganó dos veces el Cy Young Award?", opts: ["Félix Hernández", "Johan Santana", "Carlos Zambrano", "Wilson Ramos"], a: 1, fact: "Johan Santana ganó el Cy Young en 2004 con los Twins y en 2006 también con Minnesota." },
      { q: "¿Qué venezolano fue elegido al Salón de la Fama de Baseball en 2024?", opts: ["Omar Vizquel", "Bobby Abreu", "Johan Santana", "Carlos Guillén"], a: 1, fact: "Bobby Abreu fue elegido al Salón de la Fama de Baseball en 2024, reconociendo su brillante carrera." },
      { q: "¿Con qué equipo debutó en MLB el lanzador Félix Hernández?", opts: ["Los Angeles Dodgers", "Seattle Mariners", "New York Yankees", "Boston Red Sox"], a: 1, fact: "Félix 'King' Hernández debutó con los Seattle Mariners en 2005 y pasó toda su carrera allí." },
      { q: "¿Qué venezolano ostenta el récord de jonrones en un solo juego de playoffs?", opts: ["Miguel Cabrera", "Pablo Sandoval", "Carlos González", "Andrés Galarraga"], a: 1, fact: "Pablo Sandoval bateó 3 jonrones en el Juego 1 de la Serie Mundial 2012 aunque es venezolano-cubano." },
      { q: "¿Cuántos Golden Glove ganó Omar Vizquel en su carrera?", opts: ["7", "9", "11", "13"], a: 2, fact: "Omar Vizquel ganó 11 Guantes de Oro en su carrera, todos como campocorto, récord en esa posición." },
    ]
  },
  historia: {
    name: "Historia",
    icon: "📖",
    desc: "Datos históricos",
    questions: [
      { q: "¿En qué año se fundó la Liga Venezolana de Béisbol?", opts: ["1922", "1945", "1951", "1960"], a: 1, fact: "La Liga Venezolana de Béisbol Profesional fue fundada en 1945, siendo una de las ligas más antiguas de América Latina." },
      { q: "¿Cómo se llamaba el estadio de béisbol más antiguo de Caracas?", opts: ["Estadio Olímpico", "Estadio Universitario", "Estadio del Este", "La Rinconada"], a: 1, fact: "El Estadio Universitario de Caracas, inaugurado en 1951, es uno de los más icónicos del béisbol venezolano." },
      { q: "¿Quién fue el primer venezolano en jugar en las Grandes Ligas?", opts: ["Chico Carrasquel", "Luis Aparicio", "Pompeyo Davalillo", "Alex Carrasquel"], a: 0, fact: "Chico Carrasquel fue el primer venezolano en las Grandes Ligas, debutando con los Chicago White Sox en 1950." },
      { q: "¿Qué jugador venezolano tiene su número retirado por los Cleveland Indians?", opts: ["Omar Vizquel", "Andrés Galarraga", "Oswaldo Blanco", "Victor Martinez"], a: 0, fact: "Omar Vizquel tuvo su número 13 retirado por los Cleveland Indians (hoy Guardians) en reconocimiento a su carrera." },
      { q: "¿Cuándo Venezuela ganó por primera vez el Clásico Mundial de Béisbol?", opts: ["No lo ha ganado", "2009", "2013", "2017"], a: 0, fact: "Venezuela aún no ha ganado el Clásico Mundial de Béisbol, aunque ha llegado a semifinales en varias ocasiones." },
      { q: "¿En qué ciudad se construyó el primer estadio de béisbol de Venezuela?", opts: ["Maracaibo", "Valencia", "Caracas", "Barquisimeto"], a: 2, fact: "Caracas fue la primera ciudad en contar con infraestructura beisbolera formal en Venezuela." },
      { q: "¿A qué edad debutó Luis Aparicio en las Grandes Ligas?", opts: ["17 años", "19 años", "22 años", "25 años"], a: 1, fact: "Luis Aparicio debutó con los Chicago White Sox en 1956 a los 22 años, convirtiéndose en figura del béisbol mundial." },
      { q: "¿Qué ciudad venezolana tiene el estadio llamado 'Luis Aparicio El Grande'?", opts: ["Caracas", "Valencia", "Maracaibo", "Barcelona"], a: 2, fact: "El Estadio Luis Aparicio El Grande está ubicado en Maracaibo, estado Zulia, en honor al gran pelotero venezolano." },
    ]
  },
  cultura: {
    name: "Cultura",
    icon: "🇻🇪",
    desc: "Béisbol y Venezuela",
    questions: [
      { q: "¿Cuál es el deporte nacional de Venezuela según la ley?", opts: ["Fútbol", "Béisbol", "Boxeo", "Ciclismo"], a: 1, fact: "El béisbol es el deporte nacional de Venezuela, declarado así oficialmente y arraigado profundamente en la cultura venezolana." },
      { q: "¿Cómo se le llama popularmente al béisbol en Venezuela?", opts: ["La pelota fría", "El pasatiempo nacional", "La pelota caliente", "El juego del pueblo"], a: 2, fact: "En Venezuela al béisbol se le llama cariñosamente 'la pelota caliente', diferenciándolo del fútbol que llaman 'pelota fría'." },
      { q: "¿En qué región de Venezuela es más popular el béisbol?", opts: ["Los Andes", "La Costa Oriental del Lago", "La región central", "Todo el país por igual"], a: 3, fact: "El béisbol es popular en todo Venezuela, aunque tiene focos especialmente fuertes en Zulia, Carabobo y la Gran Caracas." },
      { q: "¿Cuál es el rival clásico más famoso de la LVBP?", opts: ["Leones vs Magallanes", "Tiburones vs Caracas", "Lara vs Aragua", "Zulia vs Margarita"], a: 0, fact: "El clásico Leones del Caracas vs Navegantes del Magallanes es el derbi más apasionante del béisbol venezolano." },
      { q: "¿Qué venezolano fue el primer en ingresar al Salón de la Fama de Cooperstown?", opts: ["Miguel Cabrera", "Omar Vizquel", "Luis Aparicio", "Andrés Galarraga"], a: 2, fact: "Luis Aparicio fue el primer venezolano en ser inducido al Salón de la Fama de Cooperstown, en 1984." },
      { q: "¿Cómo se llama la posición que en inglés se llama 'shortstop'?", opts: ["Receptor", "Campocorto", "Inicialista", "Jardinero"], a: 1, fact: "El campocorto o 'shortstop' es una de las posiciones más valoradas en el béisbol venezolano. Venezuela ha producido muchos de los mejores del mundo." },
      { q: "¿Cuántos venezolanos han ganado el premio Cy Young en MLB?", opts: ["1", "2", "3", "4"], a: 1, fact: "Dos venezolanos han ganado el Cy Young: Johan Santana (2 veces) y Félix Hernández (1 vez)." },
      { q: "¿Cuál de estos términos NO es béisbol venezolano?", opts: ["Jonrón", "Fly", "Ponche", "Offside"], a: 3, fact: "El offside es un término del fútbol. En béisbol se usan jonrón, fly, ponche, tubey, triplete, entre otros." },
    ]
  }
};

let selectedCat = null;
let questions = [];
let current = 0;
let score = 0;
let correct = 0;
let streak = 0;
let bestStreak = 0;
let answered = false;

function buildCatGrid() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  Object.entries(allQuestions).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (selectedCat === key ? ' selected' : '');
    btn.style.borderColor = selectedCat === key ? '#185FA5' : '';
    btn.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.name}</div><div class="cat-count">${cat.desc}</div>`;
    btn.onclick = () => { selectedCat = key; buildCatGrid(); };
    grid.appendChild(btn);
  });
}

function startGame() {
  if (!selectedCat) {
    const keys = Object.keys(allQuestions);
    selectedCat = keys[Math.floor(Math.random() * keys.length)];
  }
  questions = shuffle([...allQuestions[selectedCat].questions]).slice(0, 8);
  current = 0; score = 0; correct = 0; streak = 0; bestStreak = 0; answered = false;
  showScreen('screen-game');
  renderQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;
  document.getElementById('progress').style.width = ((current / total) * 100) + '%';
  document.getElementById('q-num').textContent = `Pregunta ${current + 1} de ${total}`;
  document.getElementById('q-score').textContent = `${score} pts`;
  document.getElementById('q-streak').textContent = streak >= 2 ? `🔥 Racha de ${streak}` : '';
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').className = 'btn-next';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => answer(i, btn);
    opts.appendChild(btn);
  });
}

function answer(idx, btn) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);
  allBtns[q.a].classList.add('correct');

  if (idx === q.a) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    const bonus = streak >= 3 ? 20 : streak === 2 ? 15 : 10;
    score += bonus;
    correct++;
    document.getElementById('feedback').textContent = streak >= 3 ? `✅ ¡Correcto! +${bonus} pts (racha ${streak}x)` : `✅ ¡Correcto! +${bonus} pts`;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.getElementById('feedback').textContent = `❌ Incorrecto. ${q.fact}`;
  }
  document.getElementById('feedback').className = 'feedback show';
  document.getElementById('q-score').textContent = `${score} pts`;
  document.getElementById('q-streak').textContent = streak >= 2 ? `🔥 Racha de ${streak}` : '';

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current + 1 < questions.length ? 'Siguiente pregunta →' : 'Ver resultado →';
  nextBtn.className = 'btn-next show';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  showScreen('screen-result');
  document.getElementById('progress').style.width = '100%';
  const pct = Math.round((correct / questions.length) * 100);
  let trophy = '🏆', title = '', sub = '';
  if (pct === 100) { trophy = '🏆'; title = '¡Eres una leyenda!'; sub = 'Perfecto. Te mereces un puesto en el Salón de la Fama.'; }
  else if (pct >= 75) { trophy = '⭐'; title = '¡Muy buen trabajo!'; sub = 'Claramente eres un verdadero fanático del béisbol venezolano.'; }
  else if (pct >= 50) { trophy = '⚾'; title = '¡Buen intento!'; sub = 'Sabes bastante, pero hay más por aprender del béisbol criollo.'; }
  else { trophy = '📖'; title = 'Sigue estudiando'; sub = 'El béisbol venezolano tiene mucha historia. ¡Inténtalo de nuevo!'; }

  document.getElementById('result-trophy').textContent = trophy;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-correct').textContent = `${correct}/${questions.length}`;
  document.getElementById('res-streak').textContent = bestStreak;
}

function shareResult() {
  const cat = allQuestions[selectedCat].name;
  const text = `Jugué la Trivia Beisbolera Venezolana - ${cat} y saqué ${score} puntos con ${correct}/${questions.length} correctas! ⚾🇻🇪`;
  if (navigator.share) {
    navigator.share({ title: 'Trivia Beisbolera', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Resultado copiado al portapapeles!'));
  }
}

function goHome() {
  selectedCat = null;
  showScreen('screen-home');
  buildCatGrid();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

buildCatGrid();
</script>
